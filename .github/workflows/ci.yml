# CI: Build & Type Check
# 每次 push/PR 到 main 都跑 build 確保不壞
# Dependabot 的 PR 也會自動驗證

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build
        env:
          CI: true
